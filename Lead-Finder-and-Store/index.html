<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Finder & Store | Jaedd</title>

    <!-- Font Awesome 6 (free CDN) for crisp vector icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2332 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            max-width: 750px;
            width: 100%;
            justify-content: center;
        }

        /* ----- glass-morphism dark cards ----- */
        .icon-card {
            flex: 1 1 280px;
            max-width: 340px;
            background: rgba(30, 41, 59, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: #1e293b;
            border-radius: 2.5rem;
            padding: 2.8rem 1.8rem 2.4rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5),
                        0 10px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.25s ease, box-shadow 0.35s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .icon-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.7),
                        0 14px 25px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* ----- icon circle ----- */
        .icon-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.8rem;
            font-size: 2.4rem;
            color: white;
            transition: transform 0.25s ease, box-shadow 0.3s;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.35);
        }

        .icon-card:hover .icon-circle {
            transform: scale(1.04);
        }

        /* first card – leads (warm gradient, left) */
        .leads .icon-circle {
            background: linear-gradient(135deg, #f97316, #ec4899);
            box-shadow: 0 14px 22px rgba(249, 115, 22, 0.25);
        }

        /* second card – store (cool gradient, right) */
        .store .icon-circle {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            box-shadow: 0 14px 22px rgba(59, 130, 246, 0.25);
        }

        .icon-circle i {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        /* ----- dark typography ----- */
        .icon-card h2 {
            font-size: 1.7rem;
            font-weight: 650;
            letter-spacing: -0.3px;
            color: #f1f5f9;
            margin-bottom: 0.6rem;
        }

        .icon-card p {
            font-size: 0.98rem;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 1.6rem;
            padding: 0 0.3rem;
        }

        .icon-card p strong {
            color: #e2e8f0;
        }

        /* subtle arrow indicator */
        .card-arrow {
            margin-top: auto;
            font-size: 0.9rem;
            font-weight: 550;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            transition: color 0.2s, gap 0.2s;
        }

        .icon-card:hover .card-arrow {
            color: #e2e8f0;
            gap: 0.65rem;
        }

        .card-arrow i {
            font-size: 0.8rem;
        }

        /* ----- responsive ----- */
        @media (max-width: 600px) {
            .card-container {
                gap: 1.8rem;
            }
            .icon-card {
                padding: 2.2rem 1.4rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">

        <!-- ========== CARD 1: Request Lead Search (placeholder link) ========= -->
        <!-- 👇 REPLACE the href below with your actual form URL when ready -->
        <a href="https://tally.so/r/D4AWd5" class="icon-card leads" target="_blank" rel="noopener noreferrer" aria-label="Request raw or warm leads">
            <div class="icon-circle">
                <i class="fas fa-magnifying-glass-chart"></i>
            </div>
            <h2>Find Leads</h2>
            <p>
                Request me to find <strong>raw or warm leads</strong> tailored to your business.
                Fill out a quick form and I'll get to work.
            </p>
            <span class="card-arrow">
                Open request form <i class="fas fa-arrow-right"></i>
            </span>
        </a>

        <!-- ========== CARD 2: Store (permanent link) ========= -->
        <a href="https://mystore.jaeddelosa.com/" class="icon-card store" target="_blank" rel="noopener noreferrer" aria-label="Visit Jaedd's store">
            <div class="icon-circle">
                <i class="fas fa-store"></i>
            </div>
            <h2>My Store</h2>
            <p>
                Browse products, resources, and offers available right now at
                <strong>mystore.jaeddelosa.com</strong>.
            </p>
            <span class="card-arrow">
                Visit store <i class="fas fa-arrow-right"></i>
            </span>
        </a>

    </div>

    <!--
        ----------------------------------------------
        HOW TO REPLACE THE PLACEHOLDER LINK:
        1. Open this file in any code editor.
        2. Find the line:
           href="https://example.com/lead-request-form"
        3. Replace that URL with your actual form link.
        4. Save the file and refresh.
        ----------------------------------------------
    -->
</body>
</html>
