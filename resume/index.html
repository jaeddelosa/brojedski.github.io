<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume – Jaed Delosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #0A0A0C;
      color: #EAEAEF;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* subtle red gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(224, 108, 108, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: -2;
    }

    .card {
      max-width: 650px;
      width: 100%;
      background: rgba(20, 20, 28, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 3rem 2.5rem;
      text-align: center;
      border: 1px solid rgba(224, 108, 108, 0.15);
      transition: all 0.2s ease;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .card:hover {
      border-color: rgba(224, 108, 108, 0.35);
      background: rgba(25, 25, 35, 0.8);
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    h3 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      background: linear-gradient(135deg, #FFFFFF 0%, #E6A0A0 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
    }

    .message {
      color: #B8B8CC;
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: linear-gradient(105deg, #C44C4C 0%, #8B2A2A 100%);
      color: white;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 40px;
      text-decoration: none;
      transition: all 0.25s ease;
      font-size: 1rem;
      box-shadow: 0 8px 20px rgba(200, 60, 60, 0.2);
      border: none;
      cursor: pointer;
    }

    .linkedin-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(105deg, #D96060 0%, #A03A3A 100%);
      box-shadow: 0 15px 25px -10px rgba(200, 60, 60, 0.4);
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #6C6C7A;
    }

    .footer-note a {
      color: #E06C6C;
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    @media (max-width: 550px) {
      .card { padding: 2rem 1.5rem; }
      h3 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📄</div>
    <h3>Resume not available at the moment</h3>
    <div class="message">
      My detailed resume is currently being updated.<br>
      Please check back soon or visit my LinkedIn profile for my professional background and experience.
    </div>
    <a href="https://www.linkedin.com/in/jaeddelosa/" target="_blank" rel="noopener noreferrer" class="linkedin-btn">
      🔗 Visit my LinkedIn Profile →
    </a>
    <div class="footer-note">
      <a href="https://jaeddelosa.com/" target="_blank">jaeddelosa.com</a> – Home
    </div>
  </div>
</body>
</html>
