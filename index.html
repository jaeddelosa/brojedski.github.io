<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔗Jaed Delosa · Link In Bio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0e14;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .terminal {
      background: #0c1018;
      border-radius: 1rem;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #2a2f3a;
      overflow: hidden;
    }
    .terminal-header {
      background: #161c24;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid #2a2f3a;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }
    .terminal-title {
      color: #9aaec0;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }
    .terminal-body {
      padding: 1.8rem;
    }
    .prompt {
      color: #5de4c7;
      margin-bottom: 1rem;
    }
    .menu-list {
      margin: 1.2rem 0;
      background: #0f121a;
      border-radius: 0.8rem;
      padding: 0.5rem 0;
    }
    .menu-item {
      display: flex;
      gap: 1rem;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      border-left: 2px solid transparent;
    }
    .menu-item:hover {
      background: #1a1f2a;
      border-left-color: #5de4c7;
    }
    .num {
      color: #ffcb6b;
      font-weight: bold;
      min-width: 2.2rem;
    }
    .desc {
      color: #e2eef9;
    }
    .input-line {
      background: #080c12;
      border: 1px solid #2a303c;
      border-radius: 0.5rem;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .input-prompt {
      color: #9ed072;
      white-space: nowrap;
    }
    input {
      background: transparent;
      border: none;
      color: #f4f9ff;
      font-family: monospace;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
    }
    .status {
      margin-top: 0.8rem;
      color: #8aaec0;
      font-size: 0.8rem;
      border-top: 1px solid #1e2430;
      padding-top: 0.8rem;
    }
    .footer {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #4a5e72;
      text-align: center;
    }
    @media (max-width: 600px) {
      .terminal-body { padding: 1rem; }
      .menu-item { flex-wrap: wrap; gap: 0.2rem; }
    }
  </style>
</head>
<body>
<div class="terminal">
  <div class="terminal-header">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <div class="terminal-title">jaed@terminal:~/link-in-bio</div>
  </div>
  <div class="terminal-body">
    <div class="prompt">➜  Hi, I'm Jaed. It's good to see you here. For options, type a number and press Enter.</div>
    <div class="menu-list" id="menuList"></div>
    <div class="input-line">
      <span class="input-prompt">$&gt;</span>
      <input type="text" id="cmdInput" placeholder="enter number (1-12)" autofocus>
    </div>
    <div class="status" id="statusMsg">Ready. Use numbers 1–12.</div>
    <div class="footer">© 2026 Jaed Delosa · links open in new tab</div>
  </div>
</div>

<script>
  // ----- define menu items -----
  const items = [
    { num: 1, label: "📧 Send email",          url: "mailto:info@jaeddelosa.com" },
    { num: 2, label: "💼 Work With Me/Hire Me",      url: "https://workwithme.jaeddelosa.com" },
    { num: 3, label: "🛍️ Digital store",       url: "https://mystore.jaeddelosa.com/" },
    { num: 4, label: "📝 Medium articles",     url: "https://jaeddelosa.medium.com" },
    { num: 5, label: "✍️ Personal blog",       url: "https://blog.jaeddelosa.com" },
    { num: 6, label: "🔗 LinkedIn",            url: "https://www.linkedin.com/in/jaeddelosa/" },
    { num: 7, label: "💬 WhatsApp chat",       url: "https://api.whatsapp.com/send/?phone=639810848049&text&type=phone_number&app_absent=0" },
    { num: 8, label: "🔒 Signal conversation", url: "https://jaedd.talk4fun.net/" },
    { num: 9, label: "✈️ Travel discounts",    url: "https://www.klook.com/invite/XLMJBT?c=PHP" },
    { num: 10, label: "📬 Contact form",       url: "https://tally.so/r/mOMAqa" },
    { num: 11, label: "📄 Show freelance note", url: "NOTE" },
    { num: 12, label: "🚪 Exit (clear screen)", url: "EXIT" }
  ];

  const freelanceNote = "📢 Freelance note: For business partnership, reach out via email (option 1) or WhatsApp (option 7).";

  // render menu
  function renderMenu() {
    const container = document.getElementById("menuList");
    if (!container) return;
    container.innerHTML = items.map(item => `
      <div class="menu-item">
        <span class="num">${item.num}.</span>
        <span class="desc">${item.label}</span>
      </div>
    `).join("");
  }

  const statusDiv = document.getElementById("statusMsg");
  const inputEl = document.getElementById("cmdInput");

  function setStatus(msg, isError = false) {
    if (statusDiv) {
      statusDiv.innerHTML = msg;
      statusDiv.style.color = isError ? "#f9ae8f" : "#8aaec0";
      setTimeout(() => {
        if (statusDiv.innerHTML === msg) statusDiv.style.color = "#8aaec0";
      }, 3000);
    }
  }

  function openUrl(url) {
    try {
      window.open(url, "_blank", "noopener,noreferrer");
      setStatus(`✅ Opened: ${url.substring(0, 60)}`);
    } catch(e) {
      setStatus(`❌ Failed: ${e.message}`, true);
    }
  }

  function handleCommand(input) {
    let trimmed = input.trim();
    if (trimmed === "") {
      setStatus("Type a number (1–12).");
      return;
    }
    const num = parseInt(trimmed, 10);
    if (isNaN(num)) {
      setStatus(`❌ "${trimmed}" is not a number. Use 1–12.`, true);
      return;
    }
    const selected = items.find(i => i.num === num);
    if (!selected) {
      setStatus(`❌ Invalid number. Valid: 1–12.`, true);
      return;
    }
    if (selected.url === "NOTE") {
      setStatus(freelanceNote);
    } else if (selected.url === "EXIT") {
      setStatus("👋 Goodbye! Clear message. Reload page to restart, or type another number.");
      inputEl.value = "";
    } else {
      openUrl(selected.url);
    }
  }

  inputEl.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      const val = inputEl.value;
      handleCommand(val);
      inputEl.value = "";
      inputEl.focus();
    }
  });

  renderMenu();
  inputEl.focus();
</script>
</body>
</html>
