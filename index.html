<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaed Delosa · JaedOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060a0f;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .terminal {
      background: #090d12;
      border-radius: 14px;
      width: 100%;
      max-width: 860px;
      border: 1px solid #1e2530;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.6);
    }

    /* ── titlebar ── */
    .titlebar {
      background: #111720;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e2530;
      user-select: none;
    }
    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .tb-title { color: #5a7a90; font-size: 13px; margin-left: 8px; letter-spacing: .04em; }
    .tb-badge {
      margin-left: auto;
      font-size: 11px; color: #3de0a8;
      border: 1px solid #1c4a38; background: #0b2820;
      border-radius: 5px; padding: 3px 10px; letter-spacing: .06em;
    }

    /* ── screen ── */
    .screen { padding: 26px 28px 28px; }

    .boot-line {
      color: #3de0a8; font-size: 13px; margin-bottom: 20px; letter-spacing: .04em;
    }
    .boot-line span { color: #4a6a80; }

    /* ── profile ── */
    .profile-row { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
    .avatar {
      width: 58px; height: 58px; border-radius: 50%;
      border: 2px solid #2de0a8;
      background: linear-gradient(135deg, #0f3028, #1a4a38);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #3de0a8; letter-spacing: .05em;
      flex-shrink: 0;
    }
    .profile-name { color: #e2eef9; font-size: 18px; font-weight: 700; letter-spacing: .04em; }
    .profile-sub  { color: #4a6a80; font-size: 13px; margin-top: 4px; }

    /* ── section label ── */
    .section-label {
      font-size: 11px; letter-spacing: .14em; color: #2a4a5a;
      text-transform: uppercase; margin-bottom: 10px; padding-left: 2px;
    }

    /* ── menu grid ── */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 20px;
    }
    .menu-item {
      background: #0d1319; border: 1px solid #1a2230; border-radius: 8px;
      padding: 11px 14px; display: flex; gap: 10px; align-items: center;
      cursor: pointer; transition: background .13s, border-color .13s;
    }
    .menu-item:hover  { background: #121c26; border-color: #2de0a8; }
    .menu-item.active { background: #0b2820; border-color: #2de0a8; }
    .mn { color: #febc2e; font-size: 13px; font-weight: 700; min-width: 24px; }
    .ml { color: #c8e0f0; font-size: 13px; }

    /* ── command input ── */
    .cmd-row {
      background: #07090e; border: 1px solid #1a2230; border-radius: 8px;
      padding: 11px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .cmd-ps    { color: #28c840; font-size: 14px; white-space: nowrap; }
    .cmd-input {
      background: transparent; border: none; color: #e8f6ff;
      font-family: inherit; font-size: 14px; width: 100%; outline: none;
    }
    .cmd-input::placeholder { color: #2a3a48; }

    /* ── status bar ── */
    .status-bar {
      background: #07090e; border: 1px solid #1a2230; border-radius: 6px;
      padding: 8px 12px; font-size: 12px; color: #4a6a80;
      display: flex; align-items: center; gap: 8px;
    }
    .status-bar.ok  { color: #3de0a8; }
    .status-bar.err { color: #f4826a; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── system bar ── */
    .sysbar {
      background: #0b1018; border-top: 1px solid #141c24;
      padding: 8px 28px; display: flex; align-items: center; gap: 22px;
      font-size: 11px; color: #2a4050;
    }
    .sysbar-item { display: flex; align-items: center; gap: 6px; }
    .sysbar-val  { color: #3a5a6a; }

    /* ── responsive ── */
    @media (max-width: 560px) {
      body { padding: 1rem; }
      .menu-grid { grid-template-columns: 1fr; }
      .screen { padding: 16px; }
      .profile-name { font-size: 15px; }
    }
  </style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="tb-title">jaed@jaedos ~ /link-in-bio</span>
    <span class="tb-badge">JaedOS v2.6</span>
  </div>

  <div class="screen">
    <div class="boot-line"><span>[ sys ] </span>session started · type a number + Enter to navigate</div>

    <div class="profile-row">
      <div class="avatar">JD</div>
      <div>
        <div class="profile-name">Jaed Delosa</div>
        <div class="profile-sub">jaed@jaedos:~/link-in-bio &nbsp;·&nbsp; 12 links loaded</div>
      </div>
    </div>

    <div class="section-label">— available commands ——————————————</div>
    <div class="menu-grid" id="menuGrid"></div>

    <div class="cmd-row">
      <span class="cmd-ps">jaed@jaedos:~$</span>
      <input class="cmd-input" id="cmdIn" type="text" placeholder="enter number (1–12)" autocomplete="off" spellcheck="false" autofocus>
    </div>
    <div class="status-bar" id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">ready — awaiting command</span>
    </div>
  </div>

  <div class="sysbar">
    <div class="sysbar-item">proc <span class="sysbar-val" id="clockEl"></span></div>
    <div class="sysbar-item">mem <span class="sysbar-val">2.6 MB</span></div>
    <div class="sysbar-item">shell <span class="sysbar-val">jsh 1.0</span></div>
  </div>
</div>

<script>
  const items = [
    { num:1,  label:"send email",        url:"mailto:info@jaeddelosa.com" },
    { num:2,  label:"work with me",      url:"https://workwithme.jaeddelosa.com" },
    { num:3,  label:"digital store",     url:"https://mystore.jaeddelosa.com/" },
    { num:4,  label:"medium articles",   url:"https://jaeddelosa.medium.com" },
    { num:5,  label:"personal blog",     url:"https://blog.jaeddelosa.com" },
    { num:6,  label:"linkedin",          url:"https://www.linkedin.com/in/jaeddelosa/" },
    { num:7,  label:"whatsapp chat",     url:"https://api.whatsapp.com/send/?phone=639810848049&text&type=phone_number&app_absent=0" },
    { num:8,  label:"signal convo",      url:"https://jaedd.talk4fun.net/" },
    { num:9,  label:"travel discounts",  url:"https://www.klook.com/invite/XLMJBT?c=PHP" },
    { num:10, label:"contact form",      url:"https://tally.so/r/mOMAqa" },
    { num:11, label:"freelance note",    url:"NOTE" },
    { num:12, label:"exit session",      url:"EXIT" },
  ];

  const grid = document.getElementById('menuGrid');
  grid.innerHTML = items.map(i => `
    <div class="menu-item" id="mi${i.num}" onclick="run(${i.num})">
      <span class="mn">${i.num}.</span>
      <span class="ml">${i.label}</span>
    </div>`).join('');

  const statusBar  = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');

  function setStatus(msg, type = '') {
    statusBar.className = 'status-bar' + (type ? ' ' + type : '');
    statusText.textContent = msg;
  }

  function highlight(num) {
    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById('mi' + num);
    if (el) el.classList.add('active');
  }

  function run(num) {
    const sel = items.find(i => i.num === num);
    if (!sel) { setStatus('error — invalid command: ' + num, 'err'); return; }
    highlight(num);
    if (sel.url === 'NOTE') {
      setStatus('freelance: contact via email (1) or whatsapp (7) for partnerships', 'ok');
    } else if (sel.url === 'EXIT') {
      setStatus('session terminated — reload to restart', '');
      document.getElementById('cmdIn').value = '';
    } else {
      window.open(sel.url, '_blank', 'noopener,noreferrer');
      setStatus('opening: ' + sel.label + ' ...', 'ok');
    }
  }

  document.getElementById('cmdIn').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = e.target.value.trim();
    e.target.value = '';
    if (!val) { setStatus('enter a number from 1 to 12', ''); return; }
    const n = parseInt(val, 10);
    if (isNaN(n) || n < 1 || n > 12) {
      setStatus('error — "' + val + '" is not a valid command (1–12)', 'err');
      return;
    }
    run(n);
  });

  function tick() {
    document.getElementById('clockEl').textContent = new Date().toTimeString().slice(0, 8);
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
