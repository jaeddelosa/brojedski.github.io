<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Page not found | Jaed Delosa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e11d48;
            --primary-dark: #9f1239;
            --primary-light: #fb7185;
            --accent: #22d3ee;
            --dark: #0a0a0f;
            --darker: #05050a;
            --light: #f1f5f9;
            --gray-light: #1e1e2e;
            --gray-medium: #6b7280;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--darker);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Background orbs matching original site */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: var(--primary);
            top: -20vh;
            right: -15vw;
            animation: float 20s infinite alternate;
        }
        .orb-2 {
            width: 45vw;
            height: 45vw;
            background: var(--accent);
            bottom: -25vh;
            left: -10vw;
            opacity: 0.15;
            animation: float 25s infinite alternate-reverse;
        }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Subtle grid */
        .grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--gray-light) 1px, transparent 1px),
                              linear-gradient(90deg, var(--gray-light) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        /* Main card */
        .error-card {
            position: relative;
            z-index: 10;
            max-width: 700px;
            margin: 2rem;
            padding: 3rem 2rem;
            background: rgba(5,5,10,0.7);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(225,29,72,0.25);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .section-tag {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(225,29,72,0.1);
            border: 1px solid rgba(225,29,72,0.3);
            border-radius: 40px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary-light);
            margin-bottom: 2rem;
        }

        .section-tag::before {
            content: '> ';
            color: var(--accent);
        }

        .error-number {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(6rem, 18vw, 10rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            background: linear-gradient(135deg, #fff, var(--gray-medium));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .message {
            font-size: 1rem;
            color: var(--gray-medium);
            max-width: 450px;
            margin: 1rem auto 2rem auto;
            line-height: 1.6;
        }

        /* Only button: Back to Home - absolute URL */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            padding: 14px 34px;
            border-radius: 60px;
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            transition: 0.25s ease;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(225,29,72,0.3);
        }

        .btn-home i {
            transition: transform 0.2s;
        }

        .btn-home:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(225,29,72,0.4);
        }

        .btn-home:hover i {
            transform: translateX(-4px);
        }

        @media (max-width: 550px) {
            .error-card {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid"></div>

    <div class="error-card">
        <div class="section-tag">error_404</div>
        <div class="error-number">404</div>
        <h1>Page not found</h1>
        <div class="message">
            The page you are looking for might have been removed or is temporarily unavailable.
        </div>
        <!-- EXACT absolute URL to jaeddelosa.com -->
        <a href="https://jaeddelosa.com/" class="btn-home">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</body>
</html>
