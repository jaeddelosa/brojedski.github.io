<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction · Jaed Delosa</title>

    <!-- Fonts: Syne + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050a;
            color: #f1f5f9;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            text-align: center;
            max-width: 640px;
        }

        /* subtle gradient orbs (just background flair) */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        .orb--1 {
            width: 400px;
            height: 400px;
            background: #e11d48;
            top: -100px;
            right: -100px;
        }

        .orb--2 {
            width: 350px;
            height: 350px;
            background: #22d3ee;
            bottom: -80px;
            left: -80px;
            opacity: 0.08;
        }

        .badge {
            display: inline-block;
            padding: 6px 20px;
            background: rgba(225, 29, 72, 0.10);
            border: 1px solid rgba(225, 29, 72, 0.20);
            border-radius: 50px;
            color: #fb7185;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 32px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.8rem, 10vw, 5rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 40%, #fb7185 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1rem;
            color: #6b7280;
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .brand {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #6b7280;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .brand a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.06);
            transition: border-color 0.2s;
        }

        .brand a:hover {
            border-color: #fb7185;
        }
    </style>
</head>
<body>

    <!-- decorative orbs -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>

    <div class="container">
        <div class="badge">under construction</div>
        <h1>Coming Soon</h1>
        <p>We're building something new. Stay tuned.</p>
        <div class="brand">
            <a href="https://jaeddelosa.com/" target="_blank">jaeddelosa.com</a>
        </div>
    </div>

</body>
</html>
